name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validar schema de Prisma
        run: pnpm --filter @marketplace/api exec prisma validate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Build (shared → api → web)
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Tests
        run: pnpm --filter @marketplace/api test

      - name: Tests e2e (sin DB, health degradado)
        run: pnpm --filter @marketplace/api test:e2e
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
