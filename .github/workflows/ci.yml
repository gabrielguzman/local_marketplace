name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      JWT_SECRET: ci-secret-no-usar-en-produccion
      JWT_ACCESS_TTL: 15m

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validar schema de Prisma
        run: pnpm --filter @marketplace/api exec prisma validate

      - name: Aplicar migraciones
        run: pnpm --filter @marketplace/api exec prisma migrate deploy

      - name: Build (shared → api → web)
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Tests
        run: pnpm --filter @marketplace/api test

      - name: Tests e2e
        run: pnpm --filter @marketplace/api test:e2e
